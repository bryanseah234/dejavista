<!DOCTYPE html>
<html>
<head>
  <title>DejaView Icon Generator</title>
  <style>
    body {
      font-family: system-ui;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    canvas {
      border: 1px solid #ddd;
      margin: 20px 0;
    }
    button {
      background: #6366F1;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    button:hover {
      background: #4F46E5;
    }
  </style>
</head>
<body>
  <h1>DejaView Icon Generator</h1>
  <p>This page generates PNG icons from the SVG. Right-click each canvas and "Save image as..."</p>
  
  <h2>128x128</h2>
  <canvas id="icon128" width="128" height="128"></canvas>
  <button onclick="download('icon128', 'icon128.png')">Download 128x128</button>
  
  <h2>48x48</h2>
  <canvas id="icon48" width="48" height="48"></canvas>
  <button onclick="download('icon48', 'icon48.png')">Download 48x48</button>
  
  <h2>32x32</h2>
  <canvas id="icon32" width="32" height="32"></canvas>
  <button onclick="download('icon32', 'icon32.png')">Download 32x32</button>
  
  <h2>16x16</h2>
  <canvas id="icon16" width="16" height="16"></canvas>
  <button onclick="download('icon16', 'icon16.png')">Download 16x16</button>

  <script>
    const svg = `
      <svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="64" cy="64" r="64" fill="#6366F1"/>
        <path d="M64 20 L44 35 L44 50 L64 65 L84 50 L84 35 Z" fill="white" opacity="0.9"/>
        <path d="M64 65 L44 80 L44 95 L64 108 L84 95 L84 80 Z" fill="white" opacity="0.7"/>
        <circle cx="90" cy="38" r="6" fill="white"/>
        <circle cx="38" cy="38" r="4" fill="white" opacity="0.8"/>
        <circle cx="90" cy="90" r="4" fill="white" opacity="0.8"/>
      </svg>
    `;

    function renderIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const img = new Image();
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      
      img.onload = function() {
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Render all icons
    renderIcon('icon128', 128);
    renderIcon('icon48', 48);
    renderIcon('icon32', 32);
    renderIcon('icon16', 16);
  </script>
</body>
</html>
